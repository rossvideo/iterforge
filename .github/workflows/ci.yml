name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check (fmt, vet, tests, policy)
        run: make check

      - name: Template smoke (scaffold + check + baseline)
        run: make templates-smoke
