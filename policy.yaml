primary_metric: accuracy
score_direction: higher_is_better
minimum_delta: 0.001
hard_gates:
  min_accuracy: 0.80
  max_latency_ms: 100
  max_failures: 2
experiment:
  timeout_seconds: 30
  results_path: logs/results.jsonl
  golden_set_path: evals/golden_set.jsonl
  mutable_paths:
    - candidates/
  frozen_paths:
    - evals/
    - cmd/
    - internal/
    - policy.yaml
